                </div>
                <button onClick={saveRoute} disabled={!selectedShips.length && !routeStops.length} style={{width:"100%",padding:12,background:(selectedShips.length||routeStops.length)?"linear-gradient(135deg,"+C.ok+",#3d8a55)":C.soft,border:"none",borderRadius:12,color:(selectedShips.length||routeStops.length)?"#fff":C.muted,fontWeight:700,cursor:(selectedShips.length||routeStops.length)?"pointer":"not-allowed",fontSize:14,boxShadow:(selectedShips.length||routeStops.length)?"0 4px 14px "+C.ok+"40":"none"}}>
                  Save Route
                </button>
              </Card>
            </div>
          </div>
        )}

        {/* ROUTES TAB */}
        {tab==="routes"&&(
          <><div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:18}}>
            {/* LEFT: Route list */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Saved Routes ({routes.length})</div>
              {!routes.length&&<Card><div style={{textAlign:"center",color:C.muted,padding:20,fontSize:12}}>No routes yet. Build one in the Builder tab.</div></Card>}
              {routes.map(r=>{
                const sel=selectedRoute===r.id;
                const totalCBMDelivery=(r.stops||[]).filter(s=>s.type==="Delivery").reduce((a,s)=>a+(parseFloat(s.cbm)||0),0);
                const totalCBMPickup=(r.stops||[]).filter(s=>s.type==="Pickup").reduce((a,s)=>a+(parseFloat(s.cbm)||0),0);
                return(
                  <div key={r.id} onClick={()=>{setSelectedRoute(r.id);setEditingRouteStops(null);}} style={{background:sel?C.accent+"10":"#ffffff",borderRadius:16,border:"1.5px solid "+(sel?C.accent:"#e8ddd0"),padding:14,cursor:"pointer",boxShadow:sel?"0 4px 16px "+C.accent+"20":"0 1px 6px #2d231808"}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:5,color:sel?C.accent:C.text}}>{r.name}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
                      <Pill label={(r.stops||[]).length+" stops"} color={C.lavender}/>
                      <Pill label={totalCBMDelivery.toFixed(1)+" CBM out"} color={C.accent}/>
                      {totalCBMPickup>0&&<Pill label={"+"+totalCBMPickup.toFixed(1)+" pickup"} color={C.gold}/>}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                      <div style={{fontSize:10,color:C.muted}}>{new Date(r.createdAt).toLocaleDateString()}</div>
                      <div style={{display:"flex",gap:5}}>
                        {r.status==="completed"&&<span style={{fontSize:9,fontWeight:700,color:C.ok,padding:"2px 7px",background:C.ok+"18",borderRadius:5}}>✓ DONE</span>}
                        {r.status!=="completed"&&<button onClick={e=>{e.stopPropagation();setConfirmCompleteRoute(r.id);}}
                          style={{padding:"2px 8px",background:"none",border:"1px solid "+C.ok+"66",borderRadius:6,color:C.ok,fontSize:10,cursor:"pointer",fontWeight:600}}>
                          ✅ Complete
                        </button>}
                        <button onClick={e=>{e.stopPropagation();setConfirmDeleteRoute(r.id);}}
                          style={{padding:"2px 8px",background:"none",border:"1px solid "+C.danger+"44",borderRadius:6,color:C.danger,fontSize:10,cursor:"pointer",fontWeight:600}}>
                          🗑 Delete
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* RIGHT: Route detail */}
            <div>
              {!viewRoute?(
                <Card><div style={{textAlign:"center",color:C.muted,padding:60,fontSize:13}}>Select a route to view details</div></Card>
              ):(()=>{
                const stops = editingRouteStops || viewRoute.stops || [];
                // Calculate running CBM
                let runCBM = (viewRoute.totalCBM||0);
                const stopsWithCBM = stops.map(s=>{
                  const cbm = parseFloat(s.cbm)||0;
                  if(s.type==="Delivery"){ runCBM = runCBM - cbm; }
                  else { runCBM = runCBM + cbm; }
                  return {...s, remainCBM: Math.max(0,runCBM)};
                });

                return(
                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                    {/* Header */}
                    <Card>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                        <div>
                          <div style={{fontSize:18,fontWeight:800,color:C.accent,marginBottom:6}}>{viewRoute.name}</div>
                          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                            <Pill label={stops.length+" stops"} color={C.lavender}/>
                            <Pill label={(viewRoute.totalCBM||0).toFixed(1)+" CBM departure"} color={C.accent}/>
                            <Pill label={fmt$(viewRoute.costs?.total)} color={C.gold}/>
                            {viewRoute.depDt&&<Pill label={"Departs "+fmtDT(new Date(viewRoute.depDt))} color={C.ok}/>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:8}}>
                          {editingRouteStops?(
                            <>
                              <button onClick={()=>{
                                const updated={...viewRoute,stops:editingRouteStops};
                                setRoutes(p=>p.map(r=>r.id===viewRoute.id?updated:r));
                                saveRouteCloud(updated);
                                setEditingRouteStops(null);
                              }} style={{padding:"8px 18px",background:C.ok,border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>
                                ✓ Save Order
                              </button>
                              <button onClick={()=>setEditingRouteStops(null)} style={{padding:"8px 14px",background:C.soft,border:"1px solid "+C.border,borderRadius:10,color:C.muted,fontWeight:600,cursor:"pointer",fontSize:12}}>
                                Cancel
                              </button>
                            </>
                          ):(
                            <>
                              <button onClick={()=>setEditingRouteStops([...viewRoute.stops])} style={{padding:"8px 16px",background:C.accent+"15",border:"1px solid "+C.accent+"44",borderRadius:10,color:C.accent,fontWeight:700,cursor:"pointer",fontSize:12}}>
                                ↕ Reorder Stops
                              </button>
                              <button onClick={()=>{
                                const optimized=optimizeRouteStops([...viewRoute.stops]);
                                const updated={...viewRoute,stops:optimized};
                                setRoutes(p=>p.map(r=>r.id===viewRoute.id?updated:r));
                                saveRouteCloud(updated);
                              }} style={{padding:"8px 16px",background:"#4a926815",border:"1px solid #4a926844",borderRadius:10,color:C.ok,fontWeight:700,cursor:"pointer",fontSize:12}}
                                title="Re-order stops using nearest-neighbor algorithm to minimize total distance">
                                ✨ Optimize Order
                              </button>
                              <button onClick={()=>setEditingRouteShipments([...(viewRoute.shipmentIds||[])])} style={{padding:"8px 16px",background:C.rose+"22",border:"1px solid "+C.rose+"55",borderRadius:10,color:C.rose,fontWeight:700,cursor:"pointer",fontSize:12}}>
                                ✏️ Edit Shipments
                              </button>
                              <button onClick={()=>handleExport(viewRoute)} disabled={exporting} style={{padding:"8px 18px",background:exporting?C.soft:"linear-gradient(135deg,"+C.rose+","+C.gold+")",border:"none",borderRadius:10,color:exporting?C.muted:"#fff",fontWeight:700,cursor:exporting?"not-allowed":"pointer",fontSize:12}}>
                                {exporting?"Generating…":"⬇ Export PDF"}
                              </button>
                            </>
                          )}
                        </div>
                      </div>
                    </Card>

                    {/* ✏️ EDIT SHIPMENTS PANEL */}
                    {editingRouteShipments&&(()=>{
                      const currentIds = editingRouteShipments;
                      const currentShips = currentIds.map(id=>shipments.find(s=>s.id===id)).filter(Boolean);
                      // All other routes' shipment IDs (to detect already-routed ones)
                      const otherRoutedIds = new Set(
                        routes
                          .filter(r=>r.id!==viewRoute?.id)
                          .flatMap(r=>r.shipmentIds||[])
                      );
                      // Free = not in any route, not released
                      const freeShips = shipments.filter(s=>
                        !currentIds.includes(s.id) &&
                        s.status!=="released" &&
                        s.status!=="routed" &&
                        !otherRoutedIds.has(s.id)
                      );
                      // Already in another route
                      const routedElsewhere = shipments.filter(s=>
                        !currentIds.includes(s.id) &&
                        s.status!=="released" &&
                        (s.status==="routed" || otherRoutedIds.has(s.id))
                      );
                      const toggleAdd = (id)=>setEditingRouteShipments(p=>[...p,id]);
                      const toggleRemove = (id)=>setEditingRouteShipments(p=>p.filter(x=>x!==id));
                      const newTotalCBM = currentIds.reduce((sum,id)=>{const s=shipments.find(x=>x.id===id);return sum+(s?parseFloat(s.cbm)||0:0);},0);
                      const ShipCard = ({s, action, actionLabel, actionStyle, cardStyle})=>{
                        const daw=daysAtWarehouse(s);
                        const dawColor=daw===null?C.muted:daw>60?"#c05050":daw>30?"#c49a3c":"#4a9268";
                        const whLabel=s.currentWarehouse||s.originWarehouse||"—";
                        const statusColor=STATUS_COLORS[s.status]||C.muted;
                        return(
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:10,padding:"9px 11px",...cardStyle}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontWeight:700,fontSize:12,color:"inherit",cursor:"pointer"}} onClick={()=>setDetailShipId(s.id)} title="Ver detalles">{s.jobNo||s.id}</div>
                              <div style={{fontSize:11,opacity:0.8,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.client}</div>
                              <div style={{fontSize:10,marginTop:2,opacity:0.7}}>{s.destCity}, {s.destState} · <strong>{parseFloat(s.cbm)||0} CBM</strong></div>
                              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                                <span style={{fontSize:10,background:statusColor+"22",color:statusColor,borderRadius:99,padding:"1px 7px",fontWeight:700}}>{STATUS_LABELS[s.status]||s.status}</span>
                                <span style={{fontSize:10,color:"#5a6a7a",fontWeight:600}}>📍 {whLabel.length>22?whLabel.slice(0,22)+"…":whLabel}</span>
                                {daw!==null&&<span style={{fontSize:10,color:dawColor,fontWeight:700}}>{daw===0?"Llegó hoy":daw+"d en WH"}</span>}
                              </div>
                            </div>
                            <button onClick={action} style={{marginLeft:8,padding:"4px 11px",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:11,flexShrink:0,...actionStyle}}>
                              {actionLabel}
                            </button>
                          </div>
                        );
                      };
                      return(
                        <Card style={{border:"2px solid "+C.rose+"66",background:"#fff9f8"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                            <ST color={C.rose}>✏️ Edit Shipments in Route</ST>
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={()=>applyRouteShipmentEdits(currentIds)} style={{padding:"8px 18px",background:C.ok,border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>
                                ✓ Save Changes
                              </button>
                              <button onClick={()=>setEditingRouteShipments(null)} style={{padding:"8px 14px",background:C.soft,border:"1px solid "+C.border,borderRadius:10,color:C.muted,fontWeight:600,cursor:"pointer",fontSize:12}}>
                                Cancel
                              </button>
                            </div>
                          </div>
                          <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
                            Total: <strong style={{color:C.accent}}>{newTotalCBM.toFixed(1)} CBM</strong> · {currentIds.length} shipment{currentIds.length!==1?"s":""}
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

                            {/* LEFT: In this route */}
                            <div>
                              <div style={{fontWeight:700,fontSize:11,color:C.accent,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                                📦 In this route ({currentShips.length})
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:320,overflowY:"auto"}}>
                                {currentShips.map(s=>(
                                  <ShipCard key={s.id} s={s}
                                    action={()=>toggleRemove(s.id)}
                                    actionLabel="✕ Remove"
                                    actionStyle={{background:"#fce8e8",border:"1px solid #e88",color:"#c44"}}
                                    cardStyle={{background:"#fff",border:"1.5px solid "+C.border,color:C.text}}
                                  />
                                ))}
                                {!currentShips.length&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",padding:"8px 0"}}>No shipments in route</div>}
                              </div>
                            </div>

                            {/* RIGHT: Available */}
                            <div>
                              {/* Free shipments */}
                              <div style={{fontWeight:700,fontSize:11,color:"#2a7a4a",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                                ✅ Free to add ({freeShips.length})
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:freeShips.length?"220px":"40px",overflowY:"auto",marginBottom:10}}>
                                {freeShips.map(s=>(
                                  <ShipCard key={s.id} s={s}
                                    action={()=>toggleAdd(s.id)}
                                    actionLabel="+ Add"
                                    actionStyle={{background:"#d4f4e0",border:"1.5px solid #4a9268",color:"#2a6a48"}}
                                    cardStyle={{background:"#edfaf3",border:"1.5px solid #4a926855",color:"#1a4a30"}}
                                  />
                                ))}
                                {!freeShips.length&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic",padding:"4px 0"}}>None available</div>}
                              </div>

                              {/* Already in another route */}
                              {routedElsewhere.length>0&&(
                                <>
                                  <div style={{fontWeight:700,fontSize:11,color:"#a07030",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8,marginTop:6,paddingTop:8,borderTop:"1px solid #e8ddd0"}}>
                                    🔒 In another route ({routedElsewhere.length})
                                  </div>
                                  <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:160,overflowY:"auto"}}>
                                    {routedElsewhere.map(s=>(
                                      <ShipCard key={s.id} s={s}
                                        action={()=>toggleAdd(s.id)}
                                        actionLabel="↔ Move"
                                        actionStyle={{background:"#f5ede0",border:"1px solid #c8a060",color:"#9a6820"}}
                                        cardStyle={{background:"#fdf8f0",border:"1.5px solid #e8c88044",color:"#7a5820",opacity:0.85}}
                                      />
                                    ))}
                                  </div>
                                </>
                              )}
                            </div>

                          </div>
                        </Card>
                      );
                    })()}

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                      {/* Stops list with drag and drop */}
                      <Card>
                        <ST color={C.accent}>
                          {editingRouteStops?"↕ Drag to reorder stops":"Route Stops"}
                        </ST>
                        {editingRouteStops&&<div style={{fontSize:11,color:C.muted,marginBottom:8,fontStyle:"italic"}}>Drag stops up or down to change delivery order</div>}
                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          {/* Montreal origin */}
                          <div style={{background:"#f0f7ff",borderRadius:10,padding:"8px 12px",border:"1.5px solid #b8d4f0",display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:16}}>🏁</span>
                            <div>
                              <div style={{fontWeight:700,fontSize:12,color:"#3a6ea5"}}>Montreal, QC</div>
                              <div style={{fontSize:10,color:C.muted}}>Origin — {(viewRoute.totalCBM||0).toFixed(1)} CBM loaded</div>
                            </div>
                          </div>

                          {stopsWithCBM.map((s,i)=>{
                            const isDelivery = s.type==="Delivery";
                            const isDragging = dragIdx===i;
                            return(
                              <div key={i}
                                draggable={!!editingRouteStops}
                                onDragStart={()=>setDragIdx(i)}
                                onDragOver={e=>{e.preventDefault();}}
                                onDrop={()=>{
                                  if(dragIdx===null||dragIdx===i)return;
                                  const arr=[...editingRouteStops];
                                  const [moved]=arr.splice(dragIdx,1);
                                  arr.splice(i,0,moved);
                                  setEditingRouteStops(arr);
                                  setDragIdx(null);
                                }}
                                onDragEnd={()=>setDragIdx(null)}
                                style={{background:isDragging?"#f5ede8":isDelivery?"#faf7f2":"#fffbf0",borderRadius:10,padding:"10px 12px",border:"1.5px solid "+(isDragging?C.accent:isDelivery?C.border:C.gold+"66"),cursor:editingRouteStops?"grab":"default",opacity:isDragging?0.5:1,transition:"all 0.15s"}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    {editingRouteStops&&<span style={{color:C.muted,fontSize:14,cursor:"grab"}}>⠿</span>}
                                    <div style={{width:22,height:22,borderRadius:"50%",background:isDelivery?C.accent:C.gold,color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                                    <div>
                                      <div style={{fontWeight:700,fontSize:12}}>{s.city}, {s.state}</div>
                                      {s.jobNo&&<div style={{fontSize:10,color:C.accent,fontWeight:600,cursor:"pointer"}} onClick={()=>setDetailShipId(s.id)}>{s.jobNo} · {s.client}</div>}
                                    </div>
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <div style={{textAlign:"right",flexShrink:0}}>
                                      <div style={{fontSize:11,fontWeight:700,color:isDelivery?C.accent:C.gold}}>
                                        {isDelivery?"📦 Delivery":"🔃 Pickup"} · {(parseFloat(s.cbm)||0).toFixed(1)} CBM
                                      </div>
                                      <div style={{fontSize:10,color:C.muted}}>
                                        {isDelivery?"▼":"▲"} {s.remainCBM.toFixed(1)} CBM remaining
                                      </div>
                                    </div>
                                    {editingRouteStops&&(
                                      <button
                                        onClick={()=>setEditingRouteStops(p=>p.filter((_,ri)=>ri!==i))}
                                        title="Remove this stop"
                                        style={{background:"#fce8e8",border:"1px solid #e88",borderRadius:8,color:"#c44",cursor:"pointer",fontSize:13,padding:"3px 8px",fontWeight:700,flexShrink:0}}>
                                        ✕
                                      </button>
                                    )}
                                  </div>
                                </div>
                              </div>
                            );
                          })}

                          {/* Final destination */}
                          <div style={{background:"#f0fff4",borderRadius:10,padding:"8px 12px",border:"1.5px solid #b8e8c8",display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:16}}>🏁</span>
                            <div>
                              <div style={{fontWeight:700,fontSize:12,color:"#3a8a55"}}>
                                {stops[stops.length-1]?.city||"Final destination"}, {stops[stops.length-1]?.state||""}
                              </div>
                              <div style={{fontSize:10,color:C.muted}}>Final stop · {stopsWithCBM[stopsWithCBM.length-1]?.remainCBM?.toFixed(1)||0} CBM on trailer</div>
                            </div>
                          </div>
                        </div>
                      </Card>

                      {/* Google Maps + CBM summary */}
                      <div style={{display:"flex",flexDirection:"column",gap:14}}>
                        {/* Google Maps */}
                        <Card>
                          <ST color={C.rose}>Route Map</ST>
                          {(()=>{
                            const origin = "Montreal, QC, Canada";
                            // Google Maps supports up to 10 waypoints
                            const allDests = stops.map(s=>s.city+", "+s.state+", USA");
                            const mapsUrl = "https://www.google.com/maps/dir/"+
                              [origin,...allDests].map(encodeURIComponent).join("/");
                            const embedUrl = "https://maps.googleapis.com/maps/api/staticmap?size=400x280&maptype=roadmap"
                              +stops.map((s,i)=>"&markers=color:"+(i===0?"green":i===stops.length-1?"red":"blue")+"%7C"+encodeURIComponent(s.city+", "+s.state+", USA")).join("")
                              +"&path=color:0xff6b6b%7Cweight:3%7C"+["Montreal, QC, Canada",...stops.map(s=>s.city+", "+s.state+", USA")].map(encodeURIComponent).join("%7C")
                              +"&key=AIzaSyD_PLACEHOLDER";
                            return(
                              <div>
                                <div style={{background:"#f0f4f8",borderRadius:10,padding:12,marginBottom:10,fontSize:11,color:C.muted,lineHeight:1.6}}>
                                  <div style={{fontWeight:700,color:C.text,marginBottom:4}}>🗺️ Route: Montreal → {stops.map(s=>s.city).join(" → ")}</div>
                                  {stops.map((s,i)=>(
                                    <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0"}}>
                                      <div style={{width:16,height:16,borderRadius:"50%",background:s.type==="Delivery"?C.accent:C.gold,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                                      <span style={{fontWeight:600}}>{s.city}, {s.state}</span>
                                      <span style={{color:s.type==="Delivery"?C.accent:C.gold,fontSize:10}}>· {s.type}</span>
                                    </div>
                                  ))}
                                </div>
                                <a href={mapsUrl} target="_blank" rel="noreferrer" style={{display:"block",textAlign:"center",padding:"10px",background:"linear-gradient(135deg,#4285f4,#34a853)",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,textDecoration:"none"}}>
                                  🗺️ Open Full Route in Google Maps
                                </a>
                              </div>
                            );
                          })()}
                        </Card>

                        {/* CBM Summary */}
                        <Card>
                          <ST color={C.gold}>CBM Summary</ST>
                          <div style={{marginBottom:8}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <span style={{fontSize:12,color:C.muted}}>📦 Loaded at departure</span>
                              <span style={{fontWeight:700,color:C.accent}}>{(viewRoute.totalCBM||0).toFixed(1)} CBM</span>
                            </div>
                            <CbmBar used={viewRoute.totalCBM||0} max={42} label=""/>
                          </div>
                          {stopsWithCBM.filter(s=>s.type==="Delivery").map((s,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.soft,fontSize:12}}>
                              <span style={{color:C.muted}}>📦 Deliver {s.city}</span>
                              <span style={{color:C.accent,fontWeight:600}}>-{(parseFloat(s.cbm)||0).toFixed(1)} → {s.remainCBM.toFixed(1)} CBM</span>
                            </div>
                          ))}
                          {stopsWithCBM.filter(s=>s.type==="Pickup").map((s,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.soft,fontSize:12}}>
                              <span style={{color:C.muted}}>🔃 Pickup {s.city}</span>
                              <span style={{color:C.gold,fontWeight:600}}>+{(parseFloat(s.cbm)||0).toFixed(1)} → {s.remainCBM.toFixed(1)} CBM</span>
                            </div>
                          ))}
                          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"2px solid "+C.soft,marginTop:4}}>
                            <span style={{fontWeight:700}}>Final CBM on trailer</span>
                            <span style={{fontWeight:800,fontSize:16,color:C.accent}}>{(stopsWithCBM[stopsWithCBM.length-1]?.remainCBM||0).toFixed(1)} CBM</span>
                          </div>
                        </Card>

                        {/* Cost Breakdown */}
                        {(()=>{
                          // Always recalculate live from stops so costs are never stale
                          const rHelpers = parseFloat(viewRoute.helpers)||0;
                          const rRate = parseFloat(viewRoute.helperRate)||150;
                          const rCross = parseFloat(viewRoute.crossDock)||0;
                          const rExtra = parseFloat(viewRoute.extraCosts)||0;

                            <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"2px solid "+C.soft,marginTop:4}}>

              </div>
            </div>
          </div>
        );
      })()}

      {/* STATUS CHANGE CONFIRM MODAL */}
      {confirmStatusChange&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000055",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>setConfirmStatusChange(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:28,maxWidth:360,width:"90%",boxShadow:"0 16px 48px #00000033"}}>
            <div style={{fontSize:18,fontWeight:800,marginBottom:6,color:C.accent}}>⚠️ Confirmar cambio</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:6}}>Job: <strong style={{color:C.text}}>{confirmStatusChange.jobNo}</strong></div>
            <div style={{fontSize:13,marginBottom:20,color:C.text}}>
              <span style={{background:STATUS_COLORS[confirmStatusChange.prevStatus]+"20",color:STATUS_COLORS[confirmStatusChange.prevStatus],borderRadius:99,padding:"3px 10px",fontWeight:700,fontSize:12}}>{STATUS_LABELS[confirmStatusChange.prevStatus]||confirmStatusChange.prevStatus}</span>

            {(confirmStatusChange.newStatus==="released")&&<div style={{fontSize:12,background:"#fff8ed",border:"1px solid "+C.warn+"44",borderRadius:10,padding:"10px 14px",marginBottom:16,color:"#8a6020"}}>⚠️ Released es permanente — el job saldrá de todas las vistas activas.</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{

                Confirmar
              </button>
              <button onClick={()=>setConfirmStatusChange(null)} style={{flex:1,padding:"10px",background:"#f0ece8",border:"none",borderRadius:10,color:"#666",fontWeight:700,cursor:"pointer",fontSize:14}}>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      )}

      
          </div>
        )}

{/* ACTIVITY LOG MODAL */}
      {activityShipId&&(()=>{
        const ship = shipments.find(s=>s.id===activityShipId);
        const logs = activityLog.filter(l=>l.shipment_id===activityShipId)
          .sort((a,b)=>new Date(b.changed_at).getTime()-new Date(a.changed_at).getTime());
        const STATUS_LABEL = (s)=>({
          incoming:"Incoming", at_warehouse:"At Warehouse", pending_transfer:"Needs Transfer",
          in_transit:"In Transit → MTL", at_montreal:"At Montreal", routed:"Routed", released:"Released ✓"
        })[s]||s;
        const STATUS_COLOR = (s)=>({
          incoming:"#8a7a6a", at_warehouse:"#5a8ab5", pending_transfer:"#c49a3c",
          in_transit:"#c49a3c", at_montreal:"#4a9268", routed:"#a08abb", released:"#5a9e8a"
        })[s]||"#888";
        return(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000060",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}
            onClick={()=>setActivityShipId(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:0,maxWidth:480,width:"92%",boxShadow:"0 20px 60px #00000030",overflow:"hidden",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
              {/* Header */}
              <div style={{background:"linear-gradient(135deg,#2d2340,#3d3560)",padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:2}}>📋 Activity Log</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.65)"}}>{ship?.jobNo} — {ship?.client}</div>
                </div>
                <button onClick={()=>setActivityShipId(null)} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,color:"#fff",width:30,height:30,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              {/* Log entries */}
              <div style={{overflowY:"auto",flex:1,padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
                {!logs.length&&(
                  <div style={{textAlign:"center",padding:"30px 0",color:"#aaa",fontSize:13}}>
                    No status changes recorded yet.<br/>
                    <span style={{fontSize:11}}>Changes will appear here automatically.</span>
                  </div>
                )}
                {logs.map((l,i)=>{
                  const dt=new Date(l.changed_at);
                  const dateStr=dt.toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"});
                  const timeStr=dt.toLocaleTimeString("en-CA",{hour:"2-digit",minute:"2-digit"});
                  return(
                    <div key={l.id||i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                      {/* Timeline dot */}
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,marginTop:4}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:STATUS_COLOR(l.to_status),boxShadow:"0 0 0 3px "+STATUS_COLOR(l.to_status)+"33"}}/>
                        {i<logs.length-1&&<div style={{width:2,height:28,background:"#eee",marginTop:4}}/>}
                      </div>
                      {/* Content */}
                      <div style={{flex:1,background:"#fafaf9",borderRadius:10,padding:"9px 13px",border:"1px solid #eee"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                            {l.from_status&&<span style={{fontSize:10,color:"#aaa",background:"#f0f0f0",padding:"1px 7px",borderRadius:4}}>{STATUS_LABEL(l.from_status)}</span>}
                            {l.from_status&&<span style={{fontSize:11,color:"#ccc"}}>→</span>}
                            <span style={{fontSize:10,fontWeight:700,color:STATUS_COLOR(l.to_status),background:STATUS_COLOR(l.to_status)+"18",padding:"1px 8px",borderRadius:4}}>{STATUS_LABEL(l.to_status)}</span>
                          </div>
                          <span style={{fontSize:10,color:"#bbb",flexShrink:0,marginLeft:8}}>{timeStr}</span>
                        </div>
                        <div style={{fontSize:11,color:"#999"}}>{dateStr}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* Footer */}
              <div style={{padding:"12px 20px",borderTop:"1px solid #f0ece8",background:"#fdfcfb"}}>
                <div style={{fontSize:11,color:"#bbb",textAlign:"center"}}>{logs.length} status change{logs.length!==1?"s":""} recorded</div>
              </div>
            </div>
          </div>
        );
      })()}
    </main>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
