function haversineKm(ll1, ll2){
  const R=6371, toR=Math.PI/180;
  const dLat=(ll2[0]-ll1[0])*toR, dLon=(ll2[1]-ll1[1])*toR;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Nearest-neighbor route optimizer
// Deliveries first (trailer loaded), pickups at end (trailer emptying)
function optimizeRouteStops(stops){
  if(stops.length<=1) return stops;
  const deliveries=stops.filter(s=>s.type==="Delivery");
  const pickups=stops.filter(s=>s.type!=="Delivery");
  
  // Optimize deliveries with nearest-neighbor from Montreal
  let current=[45.50,-73.57]; // Montreal
  const optimized=[];
  const remaining=[...deliveries];
  while(remaining.length>0){
    let bestIdx=0, bestDist=Infinity;
    remaining.forEach((s,i)=>{
      const ll=getCityLatLon(s.city,s.state);
      const d=haversineKm(current,ll);
      if(d<bestDist){bestDist=d;bestIdx=i;}
    });
    const next=remaining.splice(bestIdx,1)[0];
    current=getCityLatLon(next.city,next.state);
    optimized.push(next);
  }
  
  // Optimize pickups with nearest-neighbor from last delivery
  const optimizedPickups=[];
  const remPickups=[...pickups];
  while(remPickups.length>0){
    let bestIdx=0, bestDist=Infinity;
    remPickups.forEach((s,i)=>{
      const ll=getCityLatLon(s.city,s.state);
      const d=haversineKm(current,ll);
      if(d<bestDist){bestDist=d;bestIdx=i;}
    });
    const next=remPickups.splice(bestIdx,1)[0];
    current=getCityLatLon(next.city,next.state);
    optimizedPickups.push(next);
  }
  
  const result=[...optimized,...optimizedPickups];
  // Set distToNext on each stop for cost calculation
  for(let i=0;i<result.length-1;i++){
    const ll1=getCityLatLon(result[i].city,result[i].state);
    const ll2=getCityLatLon(result[i+1].city,result[i+1].state);
    result[i].distToNext=Math.round(haversineKm(ll1,ll2)*0.621371*1.25); // km→mi with road factor
  }
  if(result.length>0) result[result.length-1].distToNext=0;
  return result;
}

        const pos=getCityCoords(stop.city,stop.state),col=STOP_COLORS[stop.type]||C.accent,isFirst=si===0,isLast=si===stops.length-1,eta=etas[si];
        return(
          <g key={si}>
            <circle cx={pos[0]} cy={pos[1]} r="10" fill="none" stroke={col} strokeWidth="1" opacity="0.3"/>
            <circle cx={pos[0]} cy={pos[1]} r={isFirst||isLast?7:5.5} fill={isFirst?C.ok:isLast?C.rose:col} stroke="#ffffff" strokeWidth="1.5"/>
            <text x={pos[0]} y={pos[1]} fill="#ffffff" fontSize={isFirst||isLast?"7":"6"} fontWeight="bold" textAnchor="middle" dominantBaseline="middle">{si+1}</text>
            <text x={pos[0]+10} y={pos[1]-5} fill={col} fontSize="7" fontWeight="bold" fontFamily="sans-serif">{stop.city}</text>
            {eta&&<text x={pos[0]+10} y={pos[1]+5} fill="#2d231866" fontSize="6" fontFamily="sans-serif">{fmtDT(eta.arrive)}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function RouteTimeline({stops,depDt}){
  const dep=depDt?new Date(depDt):null,etas=calcETAs(dep,stops);
  if(!dep)return <div style={{color:C.muted,fontSize:13}}>No departure time set.</div>;
  return(
    <div>
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:4}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>

          <div style={{width:2,height:24,background:C.accent+"44"}}/>
        </div>
        <div style={{paddingBottom:12}}>
          <div style={{fontSize:10,color:C.ok,fontWeight:700}}>DEPARTURE</div>
          <div style={{fontSize:14,fontWeight:800}}>{fmtDT(dep)}</div>
        </div>
      </div>
      {stops.map((stop,idx)=>{

        return(
          <div key={stop.id||idx} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{STOP_ICONS[stop.type]||"📍"}</div>
              {!isLast&&<div style={{width:2,height:24,background:col+"44"}}/>}
            </div>
            <div style={{paddingBottom:isLast?0:12,flex:1}}>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:10,color:col,fontWeight:700}}>STOP {idx+1}</span>
                <Pill label={stop.type} color={col}/>
              </div>
              <div style={{fontSize:13,fontWeight:700}}>{stop.city}, {stop.state}</div>
              <div style={{fontSize:11,color:C.accent}}>Arrive: {fmtDT(eta.arrive)}</div>
              <div style={{fontSize:11,color:C.muted}}>Depart: {fmtDT(eta.depart)}</div>
              {stop.notes&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>"{stop.notes}"</div>}
              {!isLast&&<div style={{fontSize:10,color:C.muted}}>Next: ~{stop.distToNext} mi</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

async function exportExcel(shipments, routes, pickups) {
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }
  const X = window.XLSX;
  const wb = X.utils.book_new();
  const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

  // ── STYLE HELPERS ─────────────────────────────────────────────────────────
  function hdr(text){ return {v:text, t:"s"}; }
  function cell(val){ return {v:val??"-", t: typeof val==="number"?"n":"s"}; }

  // ── SHEET 1: ONE TABLE PER ROUTE ──────────────────────────────────────────
  const routeRows = [];
  routeRows.push([`GROUPAGE REPORT — ${today}`, "", "", "", "", ""]);
  routeRows.push([]);

  const sorted = [...routes].sort((a,b)=>new Date(a.depDt||"2099")-new Date(b.depDt||"2099"));

  if(!sorted.length){
    routeRows.push(["No routes planned yet.","","","","",""]);
  } else {
    sorted.forEach((r, ri) => {
      const depLabel = r.depDt ? new Date(r.depDt).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}) : "TBD";
      const rShips = r.shipmentIds.map(id=>shipments.find(s=>s.id===id)).filter(Boolean);
      const totalCBM = rShips.reduce((s,sh)=>s+parseFloat(sh.cbm||0),0);

      // Route header row
      routeRows.push([`ROUTE ${ri+1}: ${r.name.toUpperCase()}`, "", "", "", "", ""]);
      routeRows.push([`Departure: ${depLabel}`, `Stops: ${r.stops?.length||0}`, `Total CBM: ${totalCBM.toFixed(1)} / 42 CBM`, "", "", ""]);
      routeRows.push([]);

      // Shipments table header
      routeRows.push(["File #", "Client", "Current Warehouse", "Destination City", "State", "CBM"]);

      // Shipments rows
      if(!rShips.length){
        routeRows.push(["—","No shipments linked","","","",""]);
      } else {
        [...rShips].sort((a,b)=>(a.destState||"").localeCompare(b.destState||"")).forEach(s=>{
          routeRows.push([
            s.jobNo||"—",
            s.client||"—",
            s.currentWarehouse||s.originWarehouse||"—",
            s.destCity||"—",
            s.destState||"—",
            parseFloat(s.cbm||0),
          ]);
        });
        // CBM subtotal
        routeRows.push(["","","","","TOTAL CBM →", totalCBM]);
      }

      // Stop sequence
      routeRows.push([]);
      routeRows.push(["STOP SEQUENCE","City","State","Type","","ETA"]);
      const etas = calcETAs(r.depDt?new Date(r.depDt):null, r.stops||[]);
      (r.stops||[]).forEach((stop,i)=>{
        routeRows.push([
          `Stop ${i+1}`,
          stop.city||"—",
          stop.state||"—",
          stop.type||"—",
          "",
          etas[i] ? fmtDT(etas[i].arrive) : "—",
        ]);
      });

      routeRows.push([]);
      routeRows.push(["─────────────────────────","","","","",""]);
      routeRows.push([]);
    });
  }

  const ws1 = X.utils.aoa_to_sheet(routeRows);
  ws1["!cols"] = [{wch:22},{wch:26},{wch:20},{wch:20},{wch:16},{wch:10}];
  X.utils.book_append_sheet(wb, ws1, "Routes");

  // ── SHEET 2: SACRAMENTO WEST COAST ───────────────────────────────────────
  const WEST = WEST_COAST_STATES;
  const wcShips = shipments.filter(s=>WEST.includes(s.destState)&&s.status!=="released");
  const wcCBM = wcShips.reduce((s,sh)=>s+parseFloat(sh.cbm||0),0);
  const sacrRows = [];
  sacrRows.push([`WEST COAST GROUPAGE — SACRAMENTO DIRECT — ${today}`,"","","","",""]);
  sacrRows.push([`Total: ${wcShips.length} shipments  ·  ${wcCBM.toFixed(1)} CBM of 85 CBM (53ft)  ·  ${Math.round(wcCBM/85*100)}% full`,"","","","",""]);
  sacrRows.push([]);

  // Group by state
  const byState = wcShips.reduce((acc,s)=>{
    const st=s.destState||"Unknown";
    if(!acc[st]) acc[st]=[];
    acc[st].push(s);
    return acc;
  },{});

  Object.entries(byState).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([state, ships])=>{
    const stateCBM = ships.reduce((s,sh)=>s+parseFloat(sh.cbm||0),0);
    sacrRows.push([state.toUpperCase(), "", "", "", `${stateCBM.toFixed(1)} CBM`, ""]);
    sacrRows.push(["File #","Client","Destination City","Current Warehouse","CBM","Est. Arrival"]);
    ships.forEach(s=>{
      sacrRows.push([
        s.jobNo||"—", s.client||"—", s.destCity||"—",
        s.currentWarehouse||"—", parseFloat(s.cbm||0),
        s.warehouseDate ? new Date(s.warehouseDate).toLocaleDateString("en-US") : "—",
      ]);
    });
    sacrRows.push(["","","","","Subtotal →", stateCBM]);
    sacrRows.push([]);
  });

  if(!wcShips.length) sacrRows.push(["No West Coast shipments yet.","","","","",""]);
  const ws2 = X.utils.aoa_to_sheet(sacrRows);
  ws2["!cols"] = [{wch:14},{wch:26},{wch:20},{wch:20},{wch:10},{wch:16}];
  X.utils.book_append_sheet(wb, ws2, "Sacramento");

  // ── SHEET 3: TRANSFERS VANCOUVER → MONTREAL ──────────────────────────────
  const vanShips = shipments.filter(s=>
    (s.originWarehouse==="Vancouver"||s.currentWarehouse==="Vancouver")&&
    s.status!=="released"
  );
  const vanCBM = vanShips.reduce((s,sh)=>s+parseFloat(sh.cbm||0),0);
  const vanRows = [];
  vanRows.push([`TRANSFERS PENDING — VANCOUVER → MONTREAL — ${today}`,"","","",""]);
  vanRows.push([`Total: ${vanShips.length} shipments  ·  ${vanCBM.toFixed(1)} CBM pending transfer`,"","","",""]);
  vanRows.push([]);
  vanRows.push(["File #","Client","Destination (USA)","CBM","Status","Est. at Warehouse"]);
  [...vanShips].sort((a,b)=>{
    const o={"at_warehouse":0,"incoming":1,"in_transit":2,"at_montreal":3};
    return (o[a.status]||9)-(o[b.status]||9);
  }).forEach(s=>{
    vanRows.push([
      s.jobNo||"—", s.client||"—",
      [s.destCity, s.destState].filter(Boolean).join(", ")||s.destination||"—",
      parseFloat(s.cbm||0),
      STATUS_LABELS[s.status]||s.status,
      s.warehouseDate ? new Date(s.warehouseDate).toLocaleDateString("en-US") : "—",
    ]);
  });
  vanRows.push([]);
  vanRows.push(["","","","TOTAL CBM →", vanCBM, ""]);
  if(!vanShips.length) vanRows.push(["No pending Vancouver transfers.","","","","",""]);
  const ws3 = X.utils.aoa_to_sheet(vanRows);
  ws3["!cols"] = [{wch:14},{wch:26},{wch:26},{wch:8},{wch:18},{wch:18}];
  X.utils.book_append_sheet(wb, ws3, "Vancouver → MTL");

  const date = new Date().toISOString().slice(0,10);
  X.writeFile(wb, `MoveFlow_${date}.xlsx`);
}


async function exportRoutePDF(route, shipments, cadRate) {
  if (!window.jspdf) {
    await new Promise((resolve,reject) => {
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload=resolve; s.onerror=reject; document.head.appendChild(s);
    });
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,H=297,M=15;
  let y=M;
  function rgb(hex){ return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }
  function fillR(hex,x,yy,w,h){ doc.setFillColor(...rgb(hex)); doc.rect(x,yy,w,h,"F"); }
  function t(text,x,yy,size,hex,bold,opts){ doc.setFontSize(size);doc.setTextColor(...rgb(hex||"#2d2318"));doc.setFont("helvetica",bold?"bold":"normal");doc.text(String(text||"—"),x,yy,opts); }
  function rule(yy){ doc.setDrawColor(...rgb("#e8ddd0")); doc.setLineWidth(0.25); doc.line(M,yy,W-M,yy); }
  function newPage(){ doc.addPage(); fillR("#faf7f2",0,0,W,H); y=M; }
  function check(need){ if(y+need>H-12) newPage(); }

  fillR("#faf7f2",0,0,W,H);
  fillR("#ffffff",0,0,W,22);
  fillR("#c17b5c",0,0,5,22);
  t("MoveFlow",M+4,14,15,"#c17b5c",true);
  t("Route Approval Report",M+46,14,10,"#2d2318");
  t(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),W-M,14,8,"#8a7a6a",false,{align:"right"});
  y=30;
  t(route.name,M,y,17,"#2d2318",true); y+=8;
  rule(y); y+=5;

  const chips=[["Stops",route.stops.length],["CBM",(route.totalCBM||0).toFixed(1)+"/"+MAX_CBM],["Miles",(route.costs?.mi||0).toLocaleString()],["Total USD",fmt$(route.costs?.total)],["Total CAD",fmtCAD(route.costs?.total,cadRate||1.36)]];
  const cw=(W-M*2)/chips.length-1;
  chips.forEach(([label,val],i)=>{
    const bx=M+i*(cw+1);
    fillR("#f5f0e8",bx,y,cw,14);
    t(label,bx+3,y+5.5,6.5,"#8a7a6a");
    t(String(val),bx+3,y+12,8,"#2d2318",true);
  });
  y+=20;

  check(25);
  t("Shipments",M,y,11,"#a08abb",true); y+=6; rule(y); y+=4;
  fillR("#f5f0e8",M,y,W-M*2,7);
  const sc=[[" Job #",24],[" Client",38],[" Destination",58],[" WH",20],[" CBM",15],[" Status",25]];
  let cx=M;
  sc.forEach(([h,w])=>{ t(h,cx,y+5,7,"#8a7a6a",true); cx+=w; });
  y+=8;
  const rShips=route.shipmentIds.map(id=>shipments.find(s=>s.id===id)).filter(Boolean);
  rShips.forEach((s,i)=>{
    check(12);
    if(i%2===0) fillR("#faf7f2",M,y-1,W-M*2,8);
    cx=M;
    const vals=[" "+s.jobNo," "+s.client," "+(s.destination||"").slice(0,28)," "+(s.currentWarehouse||"—")," "+s.cbm+" CBM"," "+(STATUS_LABELS[s.status]||s.status)];
    sc.forEach(([,w],ci)=>{ t(vals[ci]||"",cx,y+5,7.5,ci===0?"#c17b5c":"#2d2318"); cx+=w; });
    y+=9;
  });
  if(!rShips.length){ t("No shipments linked",M+2,y+5,8,"#8a7a6a"); y+=10; }
  y+=5;

  check(55);
  t("Cost Breakdown",M,y,11,"#c49a3c",true); y+=6; rule(y); y+=5;
  const crows=[["Est. Miles",(route.costs?.mi||0).toLocaleString()+" mi"],["Diesel",fmt$(route.costs?.diesel)+" / "+fmtCAD(route.costs?.diesel,cadRate||1.36)],["Tolls",fmt$(route.costs?.tolls)+" / "+fmtCAD(route.costs?.tolls,cadRate||1.36)],["Helpers",fmt$(route.costs?.helperTot)+" / "+fmtCAD(route.costs?.helperTot,cadRate||1.36)],["Cross-dock",fmt$(route.costs?.cross)+" / "+fmtCAD(route.costs?.cross,cadRate||1.36)],["Other",fmt$(route.costs?.extra)+" / "+fmtCAD(route.costs?.extra,cadRate||1.36)]];
  crows.forEach(([label,val],i)=>{
    if(i%2===0) fillR("#f5f0e8",M,y,W-M*2,9);
    t(label,M+3,y+6,8,"#8a7a6a");
    t(val,W-M-3,y+6,8,"#2d2318",true,{align:"right"});
    y+=11;
  });
  fillR("#e8ddd0",M,y,W-M*2,11);
  t("TOTAL",M+3,y+7.5,9,"#8a7a6a",true);
  t(fmt$(route.costs?.total)+" USD  /  "+fmtCAD(route.costs?.total,cadRate||1.36)+" CAD",W-M-3,y+7.5,10,"#c17b5c",true,{align:"right"});
  y+=17;

  check(85);
  t("Route Map",M,y,11,"#d4748a",true); y+=6; rule(y); y+=4;
  const svgEl=document.getElementById("pdf-map-svg");
  if(svgEl){
    try{
      const svgStr=new XMLSerializer().serializeToString(svgEl);
      const canvas=document.createElement("canvas"); canvas.width=760; canvas.height=400;
      const ctx=canvas.getContext("2d"); const img=new Image();
      await new Promise(res=>{ img.onload=res; img.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svgStr))); });
      ctx.drawImage(img,0,0);
      const mw=W-M*2,mh=mw*(400/760);
      doc.addImage(canvas.toDataURL("image/png"),"PNG",M,y,mw,mh);
      y+=mh+6;
    }catch(e){ t("[Map unavailable]",M,y+6,8,"#8a7a6a"); y+=12; }
  }

  if(route.depDt){
    check(30); t("Delivery Schedule",M,y,11,"#5a9e8a",true); y+=6; rule(y); y+=5;
    t("Departure: "+fmtDT(new Date(route.depDt)),M+2,y+5,8,"#4a9268",true); y+=11;
    const etas=calcETAs(new Date(route.depDt),route.stops);
    route.stops.forEach((stop,idx)=>{
      check(16);
      const eta=etas[idx];
      if(idx%2===0) fillR("#faf7f2",M,y-1,W-M*2,stop.notes?20:15);
      t((idx+1)+".  "+stop.city+", "+stop.state,M+4,y+5.5,8.5,"#2d2318",true);
      t("["+stop.type+"]",M+90,y+5.5,7,"#8a7a6a");
      if(eta){ t("Arrive: "+fmtDT(eta.arrive),M+4,y+12,7,"#c17b5c"); t("Depart: "+fmtDT(eta.depart),M+85,y+12,7,"#8a7a6a"); }
      if(stop.notes){ t("Note: "+stop.notes,M+4,y+18,6.5,"#8a7a6a"); }
      y+=stop.notes?23:15;
    });
  }

  const np=doc.internal.getNumberOfPages();
  for(let p=1;p<=np;p++){
    doc.setPage(p);
    fillR("#f5f0e8",0,H-9,W,9);
    t("MoveFlow  |  "+route.name+"  |  Confidential",M,H-3.5,7,"#8a7a6a");
    t("Page "+p+" of "+np,W-M,H-3.5,7,"#8a7a6a",false,{align:"right"});
  }
  doc.save((route.name||"route").replace(/[^a-z0-9]/gi,"_")+".pdf");
}

function OcrPanel({ onImport }) {
  const [images, setImages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [parsed, setParsed] = useState([]);
  const [error, setError] = useState(null);
  const [editing, setEditing] = useState({});
  const [apiKey, setApiKey] = useState(localStorage.getItem('mf_anthropic_key')||"");
  function saveKey(k){ setApiKey(k); localStorage.setItem('mf_anthropic_key', k); }

  function handleFiles(e) {
    const files = Array.from(e.target.files||[]);
    Promise.all(files.map(file => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res({ name:file.name, base64:ev.target.result.split(",")[1], preview:ev.target.result, type:file.type });
      r.readAsDataURL(file);
    }))).then(imgs => setImages(p => [...p, ...imgs]));
  }

  async function scanImages() {
    if (!images.length) return;
    setLoading(true); setError(null); setParsed([]);
    try {
      const imageContent = images.map(img => ({ type:"image", source:{ type:"base64", media_type:img.type||"image/jpeg", data:img.base64 } }));
      const ANTHROPIC_KEY = localStorage.getItem('mf_anthropic_key')||"";
      if(!ANTHROPIC_KEY){ setError("Ingresa tu Anthropic API key arriba antes de escanear."); setLoading(false); return; }
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":ANTHROPIC_KEY, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:2000,
          messages:[{ role:"user", content:[...imageContent,{ type:"text", text:`You are analyzing a moving company groupage manifest or handwritten notes. Extract ALL shipments visible.

IMPORTANT RULES:
- File/job numbers: take the number EXACTLY as it appears. Do not modify it.
- Client name: combine First Name + Last Name if in separate columns, or use Client Name column directly.
- Volume/CBM: look for columns named "Volume", "CBM", "Quoted", "Actual" — prefer "Actual" if both exist.
- Destination vs Origin: look for a column called "Origin" or "Dest." or "Destination".
  * If the row shows "Dest." → this is a normal DELIVERY shipment (type: "delivery")
  * If the row shows "Origin" → this is a PICKUP from an agent/partner (type: "pickup"). The city/state is WHERE TO PICK UP FROM, not where to deliver.
  * Set field "shipmentType": "delivery" or "pickup" accordingly.
- Destination: extract city and state/province. States can be 2-letter codes (TX, CA, NY) or full names.
- Delivery date: look for "Del Date", "Date of Delivery", "Est.", "ETA" columns or handwritten dates — this is the estimated arrival/delivery date.
- If location shows "City, ST" format, split into destCity and destState.

HANDWRITTEN NOTES — also look for handwritten annotations on the document or separate notes that say things like:
- "In transit to Vancouver", "En tránsito a Fort Lauderdale", "heading to Montreal" → set status to "in_transit" and currentWarehouse to the warehouse mentioned
- "At Vancouver warehouse", "En warehouse Florida" → set status to "at_warehouse" and currentWarehouse accordingly
- "ETA March 15", "llega 20 marzo", "arrives March 9" → set this as readyDate (warehouse arrival date)
- Warehouse name mapping: "Vancouver" → "Vancouver", "Calgary" → "Calgary", "Halifax" → "Halifax", "Montreal" or "Anjou" or "MTL" → "Anjou (Montreal)", "Quebec" or "QC" → "Quebec City", "Florida" or "Fort Lauderdale" or "FL" → "Fort Lauderdale, FL", "Sacramento" or "CA" → "Sacramento, CA", "Seattle" or "WA" → "Seattle, WA"
- If no transit/warehouse note found, set status to "incoming" and currentWarehouse to "Anjou (Montreal)" by default.

Return ONLY a valid JSON array, no markdown, no explanation. Each object must have:
{
  "jobNo": "BR709667",
  "client": "Michael Basile",
  "destCity": "Kemah",
  "destState": "Texas",
  "cbm": 2,
  "warehouseDate": "2026-03-19T00:00:00",
  "destination": "Kemah, TX",
  "status": "incoming",
  "currentWarehouse": "Anjou (Montreal)",
  "readyDate": "",
  "originType": "international",
  "shipmentType": "delivery",
  "notes": ""
}
Set shipmentType to "pickup" if the row label is "Origin" (agent pickup), "delivery" otherwise.

For status: use "in_transit" if heading to a warehouse, "at_warehouse" if already there, "at_montreal" if at Anjou Montreal, "incoming" if unknown.
For readyDate: use ISO date format YYYY-MM-DD if a date is mentioned, otherwise empty string.
If state is a 2-letter code, convert to full name (TX→Texas, CA→California, NY→New York, ON→Ontario, QC→Quebec, BC→British Columbia, etc.).` }] }]
        })
      });
      const data = await response.json();
      const text = (data.content||[]).map(b=>b.text||"").join("").trim().replace(/```json|```/g,"").trim();

function AiPanel({shipments,routes,pickups,onAddShipment,onUpdateShipment}){
  const[msgs,setMsgs]=useState([{role:"a",text:"Good morning! ✨ Paste an email, Slack message, or screenshot to update shipments instantly — EN, ES, or FR."}]);
  const[input,setInput]=useState(""),loading=useState(false),pending=useState(null),images=useState([]);
  const[ldg,setLdg]=loading,[pend,setPend]=pending,[imgs,setImgs]=images;
  const msgsRef=useRef(null);
  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);
  function handleFile(e){
    const files=Array.from(e.target.files||[]);
    Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=ev=>res({name:f.name,base64:ev.target.result.split(",")[1],preview:ev.target.result,type:f.type});r.readAsDataURL(f);}))).then(i=>setImgs(p=>[...p,...i]));
  }
  async function send(){
    const txt=input.trim();
    if(!txt&&!imgs.length)return;
    const apiKey=localStorage.getItem("mf_anthropic_key")||"";
    if(!apiKey){setMsgs(p=>[...p,{role:"a",text:"⚠️ Please set your Anthropic API key (🔑 button in toolbar)."}]);return;}
    const userMsg=txt||(imgs.length?"[Screenshot attached]":"");
    setMsgs(p=>[...p,{role:"u",text:userMsg}]);
    setInput("");setLdg(true);
    const sys=`You are an AI logistics assistant for Brytor International Moving. Analyze the message and extract shipment/logistics info.
Active shipments: ${shipments.filter(s=>s.status!=="released").length}. At Montreal: ${shipments.filter(s=>s.status==="at_montreal").length}. Routes: ${routes.filter(r=>r.status!=="completed").length}.
Respond ONLY in JSON: {"action":"new_shipment"|"update_shipment"|"info","summary":"what you found","data":{"jobNo":"","client":"","cbm":0,"destCity":"","destState":"","originType":"international","currentWarehouse":"Anjou (Montreal)","notes":"","pickupDate":""},"suggestedRoute":null,"routeCapacity":null}`;
    try{
      const content=[...imgs.map(img=>({type:"image",source:{type:"base64",media_type:img.type||"image/jpeg",data:img.base64}}))];
      if(txt)content.push({type:"text",text:txt});else content.push({type:"text",text:"Analyze this image for shipment/logistics info."});
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:sys,messages:[{role:"user",content}]})});
      const d=await res.json();
      const raw=(d.content||[]).map(b=>b.text||"").join("").trim().replace(/```json|```/g,"").trim();
      let parsed;try{parsed=JSON.parse(raw);}catch(e){parsed={action:"info",summary:raw,data:{}};}
      setImgs([]);
      if(parsed.action==="new_shipment"&&parsed.data){setMsgs(p=>[...p,{role:"a",text:parsed.summary,confirm:parsed}]);}
      else{setMsgs(p=>[...p,{role:"a",text:parsed.summary||raw}]);}
    }catch(e){setMsgs(p=>[...p,{role:"a",text:"Error: "+e.message}]);}
    setLdg(false);
  }
  function confirmAdd(parsed){
    const d=parsed.data||{};
    const ns={id:"AI_"+Date.now(),jobNo:d.jobNo||"TBD",client:d.client||"",cbm:parseFloat(d.cbm)||0,destCity:d.destCity||"",destState:d.destState||"",destination:(d.destCity||"")+(d.destState?", "+d.destState:""),originType:d.originType||"international",currentWarehouse:d.currentWarehouse||"Anjou (Montreal)",originWarehouse:d.currentWarehouse||"Anjou (Montreal)",status:"incoming",notes:d.notes||"",warehouseDate:d.pickupDate||"",readyDate:d.pickupDate||"",weight:0,createdAt:new Date().toISOString()};
    onAddShipment(ns);setPend(null);
    setMsgs(p=>p.map(m=>m.confirm===parsed?{...m,confirm:null}:m));
    setMsgs(p=>[...p,{role:"a",text:"✅ Shipment "+ns.jobNo+" added for "+ns.client+"."}]);
  }
  return(
    <div className="mf-ai-panel">
      <div className="mf-ai-head">
        <div className="mf-ai-orb">✦</div>
        <div><div style={{fontSize:12.5,fontWeight:600,color:"#2d2318"}}>AI Assistant</div><div style={{fontSize:10,color:"#8a7a6a",fontWeight:300}}>EN · ES · FR · paste or upload</div></div>
      </div>
      <div className="mf-ai-msgs" ref={msgsRef}>
        {msgs.map((m,i)=>(
          <div key={i} className={"mf-msg "+(m.role==="u"?"mf-msg-u":"mf-msg-a")}>
            <div className="mf-bbl">{m.text}</div>
            {m.confirm&&(
              <div className="mf-cc">
                <div className="mf-cc-title">✦ New Shipment — Confirm</div>
                {m.confirm.data&&[["Client",m.confirm.data.client],["Destination",(m.confirm.data.destCity||"")+(m.confirm.data.destState?", "+m.confirm.data.destState:"")],["Volume",m.confirm.data.cbm?" "+m.confirm.data.cbm+" m³":null],["Pickup date",m.confirm.data.pickupDate||null],["Suggested route",m.confirm.suggestedRoute||null]].filter(([,v])=>v).map(([k,v])=>(
                  <div key={k} className="mf-cc-row"><span className="mf-ck">{k}</span><span className="mf-cv">{v}</span></div>
                ))}
                <div className="mf-cc-btns">
                  <button className="mf-ccbtn mf-cc-yes" onClick={()=>confirmAdd(m.confirm)}>✓ Add to System</button>
                  <button className="mf-ccbtn mf-cc-no" onClick={()=>setMsgs(p=>p.map((x,j)=>j===i?{...x,confirm:null}:x))}>Dismiss</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {ldg&&<div className="mf-msg mf-msg-a"><div className="mf-bbl" style={{color:"#a08abb"}}><span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>◌</span> Analyzing…</div></div>}
        {imgs.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",padding:"3px 0"}}>{imgs.map((img,i)=>(<div key={i} style={{position:"relative"}}><img src={img.preview} style={{width:44,height:44,objectFit:"cover",borderRadius:7,border:"1.5px solid #e8ddd0"}}/><button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,width:13,height:13,borderRadius:"50%",background:"#c05050",border:"none",color:"#fff",cursor:"pointer",fontSize:7,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div>))}</div>}
      </div>
      <div className="mf-ai-ft">
        <div className="mf-hints">
          {[["📋 Paste email",""],["📸 Screenshot","__img__"],["🚢 Imports?","What imports are in progress?"],["📄 Docs check","Which shipments have missing documents?"],["🗺 Route help","Which shipments need routing?"]].map(([l,f],i)=>(
            <button key={i} className="mf-hint" onClick={()=>{if(f==="__img__")document.getElementById("ai-file-input").click();else if(f)setInput(f);}}>{l}</button>
          ))}
          <input id="ai-file-input" type="file" accept="image/*" multiple onChange={handleFile} style={{display:"none"}}/>
        </div>
        <div className="mf-ai-row">
          <textarea className="mf-ai-ta" placeholder="Type or paste — English, Spanish, or French…" rows={1} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button className="mf-ai-send" onClick={send}>↑</button>
        </div>
      </div>
    </div>
  );
}

  async function loadFromCloud(){

        sbFetch("shipments?select=id,data&order=updated_at.desc"),
        sbFetch("routes?select=id,data&order=updated_at.desc")
      ]);
      if(sRes.ok&&rRes.ok){
        const sData=await sRes.json(), rData=await rRes.json();
        const THIRTY_DAYS=30*24*3600000;
        const now=Date.now();
        // Filter: released shipments stay 30 days, then hide
        const allShips=sData.map(x=>x.data);
        const visibleShips=allShips.filter(s=>{
          if(s.status!=="released") return true;
          const t=s.releasedAt||s.updatedAt;
          if(!t) return true; // no date = keep
          return (now-new Date(t).getTime()) < THIRTY_DAYS;
        });
        // Filter: completed routes stay 30 days
        const allRoutes=rData.map(x=>x.data);
        const visibleRoutes=allRoutes.filter(r=>{
          if(r.status!=="completed") return true;
          const t=r.completedAt;
          if(!t) return true;
          return (now-new Date(t).getTime()) < THIRTY_DAYS;
        });
        // Auto-arrive: in_transit shipments whose ETA has passed → at_montreal
        const today = new Date().toISOString().split("T")[0];
        const autoArrived = visibleShips.map(s=>{
          if(s.status==="in_transit" && s.etaMontreal && s.etaMontreal <= today){
            return {...s, status:"at_montreal", currentWarehouse:"Anjou (Montreal)", warehouseDate: s.warehouseDate||s.etaMontreal};
          }
          return s;
        });
        // Save any auto-arrived ones to cloud
        autoArrived.forEach((s,i)=>{ if(s.status!==visibleShips[i].status) saveShipmentCloud(s, "in_transit"); });
        setShipments(autoArrived);
        setRoutes(visibleRoutes);

  async function completeRoute(routeId){
    const route = routes.find(r=>r.id===routeId);
    if(!route) return;
    const newShipments = [];
    const updatedShips = shipments.map(s=>{
      // Find if this shipment is a delivery in this route
      const isDelivery = (route.stops||[]).some(st=>st.type==="Delivery"&&st.shipmentId===s.id);
      if(isDelivery){
        const released = {...s, status:"released", prevStatus:s.status, releasedAt:new Date().toISOString()};
        saveShipmentCloud(released);
        return released;
      }
      return s;
    });
    // Handle pickups
    for(const stop of (route.stops||[])){
      if(stop.type!=="Pickup") continue;
      const destState = stop.state||"";
      const isCanadaOrUS = CANADA_PROVINCES.includes(destState)||US_STATES_LIST.includes(destState);
      if(!isCanadaOrUS){
        // Export (international) → released
        // Pickups don't have shipment IDs in current model, so nothing to update in shipments
        // But if there's a pickup-linked shipment in the future, handle it here
      } else {
        // Canada or USA pickup → create new delivery shipment
        const newId = "ship_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
        const newShip = {
          id: newId,
          jobNo: stop.jobNo||"",

          cbm: stop.cbm||0,
          weight: stop.weight||0,
          destCity: stop.city||"",

          createdAt: new Date().toISOString(),
          warehouseDate: new Date().toISOString().split("T")[0],
        };
        newShipments.push(newShip);
      }
    }
    setShipments([...updatedShips, ...newShipments]);

                      <div style={{textAlign:"right"}}>

                  {Object.entries(sacrShips.reduce((acc,s)=>{const st=s.destState||"?";if(!acc[st])acc[st]=[];acc[st].push(s);return acc;},{})).sort((a,b)=>a[0].localeCompare(b[0])).map(([state,ships])=>(

                          <div>
                            <span onClick={()=>navigator.clipboard.writeText(s.jobNo)} title="Click to copy" style={{fontWeight:700,color:C.accent,fontSize:12,cursor:"pointer",borderBottom:"1px dashed "+C.accent+"66"}}>{s.jobNo}</span>
                            <span style={{fontSize:12,marginLeft:6,fontWeight:600}}>{s.client}</span>

                          </div>

                </div>

              {/* FL → CA */}
              {wcSection==="fl_to_ca"&&(
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <Card style={{background:"linear-gradient(135deg,#fff8f2,#fff5ee)",border:"1.5px solid #e0784044"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800,color:"#e07840",marginBottom:4}}>🌴 Florida → California (FTL 53ft)</div>
                        <div style={{fontSize:12,color:C.muted}}>Shipments en Florida con destino West Coast — buscar carrier FTL</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:22,fontWeight:800,color:"#e07840"}}>{flToCACBM.toFixed(1)} / 92 CBM</div>

                    {flToCACBM<30&&<div style={{marginTop:8,fontSize:12,color:C.warn,fontWeight:600}}>⏳ Poco volumen — esperar más shipments</div>}
                  </Card>
                  <Card style={{padding:0,overflow:"hidden"}}>
                    <table>
                      <thead><tr style={{background:"#fff8f4"}}>
                        {["File #","Cliente","Ciudad","Estado","CBM","Status"].map(h=>(
                          <th key={h} style={{padding:"9px 13px",textAlign:"left",fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid "+C.border,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {flToCA.map((s,i)=>(
                          <tr key={s.id} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":"#fff8f444"}}>
                            <td style={{padding:"9px 13px"}}><span onClick={()=>navigator.clipboard.writeText(s.jobNo)} title="Click to copy" style={{fontWeight:700,color:C.accent,fontSize:13,cursor:"pointer",borderBottom:"1px dashed "+C.accent+"66"}}>{s.jobNo}</span></td>
                            <td style={{padding:"9px 13px",fontWeight:600}}>{s.client}</td>
                            <td style={{padding:"9px 13px",fontSize:12,color:C.muted}}>{s.destCity}</td>
                            <td style={{padding:"9px 13px"}}><Pill label={s.destState} color={"#5a9e8a"}/></td>
                            <td style={{padding:"9px 13px",fontWeight:700,color:"#e07840"}}>{s.cbm} CBM</td>
                            <td style={{padding:"9px 13px"}}><Pill label={STATUS_LABELS[s.status]||s.status} color={STATUS_COLORS[s.status]||C.muted}/></td>
                          </tr>
                        ))}
                        {!flToCA.length&&<tr><td colSpan="6" style={{padding:"40px",textAlign:"center",color:C.muted,fontSize:13}}>Sin shipments en Florida con destino West Coast</td></tr>}
                      </tbody>
                    </table>
                  </Card>
                </div>
              )}

              {/* EN CALIFORNIA */}
              {wcSection==="in_cali"&&(
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <Card style={{background:"linear-gradient(135deg,#fffbee,#fff8e8)",border:"1.5px solid "+C.gold+"44"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800,color:C.gold,marginBottom:4}}>☀️ Shipments en California</div>
                        <div style={{fontSize:12,color:C.muted}}>Seguimiento con Manager de Sacramento</div>
                      </div>
                      <button onClick={()=>{setShowShipForm(true);setEditingShip(null);setShipForm({...emptyShip,currentWarehouse:SACR_WAREHOUSE,status:"at_warehouse"});setTab("shipments");}}
                        style={{padding:"8px 16px",background:"linear-gradient(135deg,"+C.gold+",#e0b840)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>
                        + Agregar
                      </button>
                    </div>
                  </Card>
                  <Card style={{padding:0,overflow:"hidden"}}>
                    <table>
                      <thead><tr style={{background:"#fffbee"}}>
                        {["File #","Cliente","Ciudad","Estado","CBM","Notas Manager","Entrega Est."].map(h=>(
                          <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid "+C.border,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {inCali.map((s,i)=>(
                          <tr key={s.id} style={{borderBottom:"1px solid "+C.border,background:i%2===0?"transparent":"#fffbee44"}}>
                            <td style={{padding:"10px 14px"}}><span onClick={()=>navigator.clipboard.writeText(s.jobNo)} title="Click to copy" style={{fontWeight:700,color:C.accent,fontSize:13,cursor:"pointer",borderBottom:"1px dashed "+C.accent+"66"}}>{s.jobNo}</span></td>
                            <td style={{padding:"10px 14px",fontWeight:600,fontSize:13}}>{s.client}</td>
                            <td style={{padding:"10px 14px",fontSize:12,color:C.muted}}>{s.destCity}</td>
                            <td style={{padding:"10px 14px"}}><Pill label={s.destState||"CA"} color={C.gold}/></td>
                            <td style={{padding:"10px 14px",fontWeight:700,color:C.gold}}>{s.cbm} CBM</td>
                            <td style={{padding:"10px 14px"}}>
                              <input defaultValue={s.notes||""} onBlur={e=>{const u={...s,notes:e.target.value};setShipments(p=>p.map(x=>x.id===s.id?u:x));saveShipmentCloud(u);}}
                                placeholder="Notas del Manager…"
                                style={{width:"100%",minWidth:140,padding:"4px 8px",background:"#faf7f2",border:"1px solid #e8ddd0",borderRadius:6,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                            </td>
                            <td style={{padding:"10px 14px"}}>
                              <input type="date" defaultValue={s.warehouseDate?s.warehouseDate.slice(0,10):""} onBlur={e=>{const u={...s,warehouseDate:e.target.value};setShipments(p=>p.map(x=>x.id===s.id?u:x));saveShipmentCloud(u);}}
                                style={{padding:"4px 8px",background:"#faf7f2",border:"1px solid #e8ddd0",borderRadius:6,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                            </td>
                            <td style={{padding:"10px 14px"}}>
                              <button onClick={()=>{setShipments(p=>{const next=p.map(x=>x.id===s.id?{...x,status:"released"}:x);const u=next.find(x=>x.id===s.id);if(u)saveShipmentCloud(u);return next;});}}
                                style={{padding:"3px 9px",background:"#e8f5ee",border:"1px solid #8cc",borderRadius:6,color:"#3a7a4a",cursor:"pointer",fontSize:11,fontWeight:700}}>
                                ✓ Release
                              </button>
                            </td>
                          </tr>
                        ))}
                        {!inCali.length&&<tr><td colSpan="7" style={{padding:"40px",textAlign:"center",color:C.muted}}>
                          <div style={{fontSize:28,marginBottom:8}}>☀️</div>
                          <div style={{fontSize:13,fontWeight:600}}>Sin shipments en California aún</div>
                        </td></tr>}
                      </tbody>
                    </table>
                  </Card>
                </div>
              )}

            </div>
          );
        })()}

        {/* TRANSFERS TAB */}
        {tab==="transfers"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
              {[
                {label:"Needs Transfer to Montreal",items:needsTransfer,color:C.warn,icon:"📍",action:(s)=><button onClick={()=>markTransfer(s.id)} style={{padding:"5px 12px",background:C.warn+"18",border:"1px solid "+C.warn+"44",borderRadius:8,color:C.warn,cursor:"pointer",fontSize:11,fontWeight:600}}>Mark In Transit →</button>},
                {label:"In Transit → Montreal",items:inTransit,color:C.gold,icon:"🚚",action:(s)=>(
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {s.etaMontreal&&(()=>{
                      const today=new Date().toISOString().split("T")[0];
                      const diff=Math.ceil((new Date(s.etaMontreal+"T12:00")-new Date())/(1000*3600*24));
                      const late=s.etaMontreal<today;
                      return <span style={{fontSize:10,color:late?C.danger:C.muted,fontWeight:600}}>{late?"⚠️ Llegó "+new Date(s.etaMontreal+"T12:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"}):"📅 ETA "+new Date(s.etaMontreal+"T12:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"})+(diff>0?" ("+diff+"d)":"")}</span>;
                    })()}
                    <button onClick={()=>markArrived(s.id)} style={{padding:"5px 12px",background:C.ok+"18",border:"1px solid "+C.ok+"44",borderRadius:8,color:C.ok,cursor:"pointer",fontSize:11,fontWeight:600}}>✓ Arrived MTL</button>
                  </div>
                )},
                {label:"Ready at Montreal",items:atMontreal,color:C.ok,icon:"✅",action:null},
              ].map(({label,items,color,icon,action})=>(
                <Card key={label}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color}}>{icon} {label}</div>
                    <Pill label={items.length+" shipments"} color={color}/>
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Total: <b style={{color}}>{items.reduce((s,sh)=>s+parseFloat(sh.cbm||0),0).toFixed(1)} CBM</b></div>
                  <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:380,overflowY:"auto"}}>
                    {items.map(s=>(
                      <div key={s.id} style={{background:C.panel,borderRadius:12,padding:12,border:"1.5px solid "+color+"28"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div>
                            <div style={{fontWeight:700,color:C.accent,fontSize:12}}>{s.jobNo}</div>
                            <div style={{fontSize:13,fontWeight:600}}>{s.client}</div>
                            <div style={{fontSize:11,color:C.muted}}>{s.destination}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <Pill label={s.currentWarehouse||"—"} color={WH_COLORS[s.currentWarehouse]||C.muted}/>
                            <div style={{fontSize:11,fontWeight:700,color:C.accent,marginTop:4}}>{s.cbm} CBM</div>
                          </div>
                        </div>
                        {s.notes&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic",marginBottom:6}}>"{s.notes}"</div>}
                        {action&&action(s)}
                      </div>
                    ))}
                    {items.length===0&&<div style={{textAlign:"center",color:C.muted,padding:"20px 0",fontSize:12}}>Nothing here</div>}
                  </div>
                </Card>
              ))}
            </div>
            <Card>
              <ST color={C.lavender}>Transfer Pipeline Summary</ST>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
                {Object.entries([...needsTransfer,...inTransit].reduce((acc,s)=>{
                  const wh=s.currentWarehouse||s.originWarehouse||"Unknown";
                  if(!acc[wh])acc[wh]={count:0,cbm:0};
                  acc[wh].count++;acc[wh].cbm+=parseFloat(s.cbm||0);
                  return acc;
                },{})).map(([wh,data])=>(
                  <div key={wh} style={{background:"#ffffff",borderRadius:14,padding:14,border:"1.5px solid "+(WH_COLORS[wh]||C.muted)+"44",boxShadow:"0 1px 8px #2d231806"}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:4}}>FROM</div>
                    <div style={{fontWeight:700,fontSize:14,color:WH_COLORS[wh]||C.text}}>{wh}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:6}}>{data.count} shipment{data.count!==1?"s":""}</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{data.cbm.toFixed(1)} CBM</div>
                    <div style={{marginTop:8}}><CbmBar used={data.cbm}/></div>
                  </div>
                ))}
                {needsTransfer.length+inTransit.length===0&&<div style={{color:C.muted,fontSize:12,gridColumn:"1/-1",textAlign:"center",padding:20}}>No pending transfers</div>}
              </div>
            </Card>
          </div>
        )}

        {/* CAPACITY TAB */}
        {tab==="capacity"&&(()=>{
          const today = new Date(); today.setHours(0,0,0,0);
          const fmtD = d => { if(!d) return null; const dt=new Date(d); if(isNaN(dt)) return null; return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
          const diffDays = d => { if(!d) return null; const dt=new Date(d); if(isNaN(dt)) return null; dt.setHours(0,0,0,0); return Math.ceil((dt-today)/(1000*60*60*24)); };

          // Shipments heading to or already at Montreal
          const mtlShips = shipments.filter(s=>
            s.status==="at_montreal" ||
            (s.status==="in_transit" && (s.currentWarehouse===MTL_WAREHOUSE || s.directTransferToMTL))
          );
          const atMTL = shipments.filter(s=>s.status==="at_montreal");
          const inTransitMTL = shipments.filter(s=>s.status==="in_transit");
          const atMTL_CBM = atMTL.reduce((a,s)=>a+parseFloat(s.cbm||0),0);
          const totalMTL_CBM = mtlShips.reduce((a,s)=>a+parseFloat(s.cbm||0),0);

          // Earliest possible departure = latest readyDate among in-transit shipments
          // (we need to wait for all of them)
          const pendingDates = inTransitMTL.map(s=>s.readyDate||s.warehouseDate).filter(Boolean).map(d=>new Date(d)).filter(d=>!isNaN(d));
          const latestArrival = pendingDates.length ? new Date(Math.max(...pendingDates)) : null;
          const canDepartNow = inTransitMTL.length===0;
          const trailerCBM = trailerType==="custom" ? parseFloat(customCBM)||42 : (TRAILER_TYPES.find(t=>t.label===trailerType)||TRAILER_TYPES[0]).cbm;
          const pctNow = Math.min((atMTL_CBM/trailerCBM)*100,100);
          const pctTotal = Math.min((totalMTL_CBM/trailerCBM)*100,100);
          const daysUntil = latestArrival ? diffDays(latestArrival) : 0;

          // Group all active shipments by zone (for route planning)
          const US_WAREHOUSES = [FL_WAREHOUSE, SACR_WAREHOUSE, SEA_WAREHOUSE];
          const routeShips = shipments.filter(s=>s.status!=="released"&&!WEST_COAST_STATES.includes(s.destState));
          const byZone = routeShips.reduce((acc,s)=>{
            const z=getRegion(s.destState);
            if(!acc[z])acc[z]={cbm:0,ships:[],atMTL:0,inTransit:0,lastArrival:null};
            acc[z].cbm+=parseFloat(s.cbm||0);
            acc[z].ships.push(s);
            if(s.status==="at_montreal") acc[z].atMTL+=parseFloat(s.cbm||0);
            if(s.status==="in_transit"){
              acc[z].inTransit+=parseFloat(s.cbm||0);
              const d=s.readyDate||s.warehouseDate;
              if(d&&!isNaN(new Date(d))){
                if(!acc[z].lastArrival||new Date(d)>new Date(acc[z].lastArrival)) acc[z].lastArrival=d;
              }
            }
            return acc;
          },{});
          const zoneOrder=["🟢 East Coast / Florida","🔵 Midwest / Great Lakes","🟡 Central / South","🔴 Texas / Deep Central","🌐 Other"];

          return(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>

              {/* TOP SUMMARY */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

                {/* LEFT: Departure readiness */}
                <Card style={{background:"linear-gradient(135deg,#f0faf6,#f5fff8)",border:"1.5px solid "+C.ok+"44"}}>
                  <ST color={C.ok}>🚛 Departure Readiness</ST>
                  <div style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:12,color:C.muted}}>Available now (at Montreal)</span>
                      <span style={{fontWeight:700,color:C.ok}}>{atMTL_CBM.toFixed(1)} CBM — {atMTL.length} jobs</span>
                    </div>
                    <div style={{background:C.soft,borderRadius:99,height:8,overflow:"hidden"}}>
                      <div style={{width:pctNow+"%",height:"100%",background:C.ok,borderRadius:99,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:11,color:C.muted,marginTop:3}}>{pctNow.toFixed(0)}% of {trailerCBM} CBM trailer</div>
                  </div>
                  {inTransitMTL.length>0&&(
                    <div style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:C.muted}}>+ In transit to Montreal</span>
                        <span style={{fontWeight:700,color:C.gold}}>{(totalMTL_CBM).toFixed(1)} CBM total — {mtlShips.length} jobs</span>
                      </div>
                      <div style={{background:C.soft,borderRadius:99,height:8,overflow:"hidden"}}>
                        <div style={{width:pctTotal+"%",height:"100%",background:C.gold,borderRadius:99,transition:"width 0.4s"}}/>
                      </div>
                      <div style={{fontSize:11,color:C.muted,marginTop:3}}>{pctTotal.toFixed(0)}% of {trailerCBM} CBM trailer when all arrive</div>
                    </div>
                  )}
                  <div style={{background:canDepartNow?C.ok+"18":"#fff8ee",border:"1.5px solid "+(canDepartNow?C.ok:C.gold)+"55",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{canDepartNow?"✅":"⏳"}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:canDepartNow?C.ok:C.gold}}>
                        {canDepartNow ? "Ready to depart!" : "Earliest departure: "+fmtD(latestArrival)}
                      </div>
                      <div style={{fontSize:11,color:C.muted}}>
                        {canDepartNow ? "All shipments at Montreal warehouse" : daysUntil+" days until last shipment arrives"}
                      </div>
                    </div>
                  </div>
                </Card>

                {/* RIGHT: In-transit timeline */}
                <Card>
                  <ST color={C.gold}>📦 In Transit → Montreal</ST>
                  {inTransitMTL.length===0
                    ? <div style={{textAlign:"center",color:C.muted,padding:20,fontSize:12}}>No shipments in transit</div>
                    : inTransitMTL.sort((a,b)=>{
                        const da=new Date(a.readyDate||a.warehouseDate||"9999"), db=new Date(b.readyDate||b.warehouseDate||"9999");
                        return da-db;
                      }).map(s=>{
                        const d=s.readyDate||s.warehouseDate;
                        const days=diffDays(d);
                        const color=days===null?"#aaa":days<=0?C.ok:days<=3?C.warn:C.gold;
                        return(
                          <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.panel,borderRadius:10,padding:"8px 12px",marginBottom:6,border:"1px solid "+C.border}}>
                            <div>
                              <span onClick={()=>navigator.clipboard.writeText(s.jobNo)} style={{fontWeight:700,color:C.accent,fontSize:12,cursor:"pointer",borderBottom:"1px dashed "+C.accent+"66"}}>{s.jobNo}</span>
                              <span style={{fontSize:12,color:C.text,marginLeft:8}}>{s.client}</span>
                              <div style={{fontSize:11,color:C.muted}}>{s.destCity}, {s.destState} · {s.cbm} CBM</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontWeight:700,fontSize:12,color}}>{d?fmtD(d):"No date"}</div>
                              <div style={{fontSize:11,color}}>{days===null?"":days<=0?"Arrives today!":days===1?"Tomorrow":days+" days"}</div>
                            </div>
                          </div>
                        );
                      })
                  }
                </Card>
              </div>

              {/* ZONES */}
              <Card>
                <ST color={C.accent}>📍 Shipments por Zona de Ruta</ST>
                {zoneOrder.filter(z=>byZone[z]).map(zone=>{
                  const {cbm,ships,atMTL:zAtMTL,inTransit:zInTransit,lastArrival}=byZone[zone];
                  const color=zone.includes("🟢")?C.ok:zone.includes("🔵")?"#5a8ab5":zone.includes("🟡")?C.gold:zone.includes("🔴")?C.rose:C.muted;

                    <div key={zone} style={{background:C.panel,borderRadius:14,padding:14,marginBottom:10,border:"1px solid "+C.border}}>

                        <div style={{display:"flex",gap:6,alignItems:"center"}}>

                                <span style={{fontSize:11,color:C.muted}}>{s.destCity}, {s.destState}</span>

                            </div>
                          );

        {/* BUILDER TAB */}
        {tab==="builder"&&(
          <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:18}}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
                  <ST color={C.accent} style={{marginBottom:0}}>Select Shipments</ST>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <div>
                      <label style={{...lbl,marginBottom:3}}>Trailer</label>
                      <select value={trailerType.label} onChange={e=>{const t=TRAILER_TYPES.find(x=>x.label===e.target.value);setTrailerType(t);}} style={{...inp,padding:"6px 10px",width:"auto"}}>
                        {TRAILER_TYPES.map(t=><option key={t.label}>{t.label}</option>)}
                      </select>
                    </div>
                    {trailerType.label==="Custom"&&(
                      <div>
                        <label style={{...lbl,marginBottom:3}}>Max CBM</label>
                        <input type="number" value={customCBM} onChange={e=>setCustomCBM(e.target.value)} style={{...inp,padding:"6px 10px",width:80}}/>
                      </div>
                    )}
                    <div>
                      <label style={{...lbl,marginBottom:3}}>Direction</label>
                      <select value={routeDir} onChange={e=>setRouteDir(e.target.value)} style={{...inp,padding:"6px 10px",width:"auto"}}>
                        <option value="eastcoast_short">🟢 East Coast corta (MTL → VA)</option>
                        <option value="eastcoast_long">🟢 East Coast larga (MTL → FL)</option>
                        <option value="midwest">🔵 Midwest / Great Lakes (MTL → Chicago)</option>
                        <option value="central">🟡 Central / South (MTL → LA/MS)</option>
                        <option value="texas_28">🔴 Texas 28ft (MTL → TX, driver directo)</option>
                        <option value="texas_53">🔴 Texas 53ft (MTL → TX, carrier + entregas)</option>
                        <option value="return">🔄 Return (FL → MTL)</option>
                        <option value="westcoast">☀️ West Coast 53ft (MTL → Sacramento)</option>
                      </select>

                </div>
                <div style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>

                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>

                      <span style={{fontSize:12,color:totalCBM>activeCBM?C.danger:C.ok,fontWeight:700}}>{totalCBM.toFixed(1)} / {activeCBM} CBM</span>
                    </div>
                    <CbmBar used={totalCBM} max={activeCBM} label=""/>
                    {(()=>{
                      const selPickupCBM = pickups.filter(p=>p.status==="confirmed"&&p.flexDateStart).reduce((s,p)=>s+parseFloat(p.cbm||0),0);
                      return selPickupCBM>0?(
                        <div style={{marginTop:6}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:11,color:C.muted,fontWeight:600}}>🔃 Pickups (collected on return)</span>
                            <span style={{fontSize:12,color:C.gold,fontWeight:700}}>+{selPickupCBM.toFixed(1)} CBM</span>
                          </div>
                          <div style={{background:C.soft,borderRadius:99,height:6,overflow:"hidden"}}>
                            <div style={{width:Math.min((selPickupCBM/activeCBM)*100,100)+"%",height:"100%",background:C.gold,borderRadius:99}}/>
                          </div>
                          <div style={{fontSize:10,color:C.muted,marginTop:2}}>Does not count toward departure capacity</div>
                        </div>
                      ):null;
                    })()}
                  </div>
                </div>
                {/* PICKUP SUGGESTIONS ON ROUTE */}
                {(()=>{
                  const availablePickups = pickups.filter(p=>p.status==="confirmed"&&p.flexDateStart&&p.status!=="picked_up"&&p.status!=="cancelled");
                  if(!availablePickups.length) return null;
                  return(
                    <div style={{background:"#fff8f0",border:"1.5px solid "+C.rose+"44",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
                      <div style={{fontSize:12,fontWeight:700,color:C.rose,marginBottom:6}}>🔃 Pickups — select to include in route:</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto"}}>
                        {availablePickups.map(p=>{
                          const sel=selectedPickups.includes(p.id);

                            <div key={p.id} onClick={()=>setSelectedPickups(prev=>prev.includes(p.id)?prev.filter(x=>x!==p.id):[...prev,p.id])}

                                {sel&&<span style={{fontSize:10,background:C.rose+"18",color:C.rose,borderRadius:6,padding:"1px 6px",fontWeight:600}}>✓ Selected</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:6,fontStyle:"italic"}}>Pickups are collected on return — they don't count toward departure capacity</div>
                    </div>
                  );
                })()}

                  {(()=>{
                    // Filter shipments based on route direction
                    const filtered = shipments.filter(s=>{
                      if(s.status==="released") return false;
                      const ds=STATE_MAP[s.destState]||s.destState||"";
                      if(routeDir==="eastcoast_short"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && ZONE_EC_SHORT.includes(ds);
                      } else if(routeDir==="eastcoast_long"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && ZONE_EC_LONG.includes(ds);
                      } else if(routeDir==="midwest"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && ZONE_MIDWEST.includes(ds);
                      } else if(routeDir==="central"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && ZONE_CENTRAL.includes(ds);
                      } else if(routeDir==="texas_28"||routeDir==="texas_53"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && ZONE_TEXAS.includes(ds);
                      } else if(routeDir==="return"){
                        return s.currentWarehouse===FL_WAREHOUSE ||
                          (s.status==="in_transit" && !WEST_COAST_STATES.includes(s.destState));
                      } else if(routeDir==="westcoast"){
                        return !US_WAREHOUSES.includes(s.currentWarehouse) && WEST_COAST_STATES.includes(s.destState);
                      }
                      return false;
                    });
                    if(filtered.length===0) return (
                      <div style={{textAlign:"center",color:C.muted,padding:30,fontSize:13}}>
                        <div style={{fontSize:24,marginBottom:8}}>
                          {routeDir==="return"?"🔄":routeDir==="westcoast"?"☀️":routeDir==="midwest"?"🔵":routeDir.startsWith("texas")?"🔴":routeDir==="central"?"🟡":"🟢"}
                        </div>
                        <div style={{fontWeight:600}}>
                          {routeDir==="return"?"No shipments at Fort Lauderdale for return route"
                          :routeDir==="westcoast"?"No West Coast shipments ready at Montreal"
                          :"No shipments ready for this route"}
                        </div>
                      </div>
                    );
                    // Separate: already at FL vs in transit to FL
                    // For return routes: split at-FL vs in-transit. For all other routes: show all.
                    const atFL = routeDir==="return" ? filtered.filter(s=>s.currentWarehouse===FL_WAREHOUSE&&s.status!=="in_transit") : filtered.filter(s=>s.status!=="in_transit");
                    const inTransitToFL = filtered.filter(s=>s.status==="in_transit");
                    const orderedShips = [...atFL, ...inTransitToFL];
                    return orderedShips.map((s,idx)=>{
                      const isFirstTransit = routeDir==="return" && inTransitToFL.length>0 && s.id===inTransitToFL[0].id;
                      const sel=selectedShips.includes(s.id);
                      const eta=s.readyDate||s.warehouseDate;
                      const etaDate=eta?new Date(eta):null;
                      const isHere=s.status==="at_montreal"||s.status==="at_warehouse";
                      const isTransit=s.status==="in_transit";
                      const isIncoming=s.status==="incoming";
                      const whLabel=s.currentWarehouse?s.currentWarehouse.split(",")[0]:"—";
                      const etaLabel=isHere?"✅ "+whLabel
                        :isTransit&&etaDate?"⏳ arrives "+etaDate.toLocaleDateString("en-US",{month:"short",day:"numeric"})
                        :isIncoming?"📥 Incoming — "+whLabel
                        :whLabel;
                      const etaColor=isHere?C.ok:isTransit?C.gold:C.muted;
                      const zone=getRegion(s.destState);
                      const zoneColor=zone.includes("🟢")?C.ok:zone.includes("🔵")?"#5a8ab5":zone.includes("🟡")?C.gold:zone.includes("🔴")?C.rose:"#7a9abb";
                      return(
                        <React.Fragment key={s.id}>
                        {isFirstTransit&&<div style={{fontSize:11,fontWeight:700,color:C.gold,padding:"6px 4px 2px",borderTop:"1px dashed "+C.border,marginTop:4}}>⏳ In transit — arriving at Fort Lauderdale:</div>}
                        <div onClick={()=>toggleShip(s.id)} style={{background:sel?C.accent+"10":"#faf7f2",borderRadius:12,padding:"11px 13px",border:"1.5px solid "+(sel?C.accent:"#e8ddd0"),cursor:"pointer",boxShadow:sel?"0 3px 12px "+C.accent+"20":"none",transition:"all 0.15s"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                <span style={{fontWeight:700,color:C.accent,fontSize:13}}>{s.jobNo}</span>
                                <span style={{fontSize:12,color:C.text}}>{s.client}</span>
                              </div>
                              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.destCity}, {s.destState}</div>
                              <div style={{fontSize:10,marginTop:3,display:"flex",gap:6,flexWrap:"wrap"}}>
                                <span style={{color:zoneColor,fontWeight:600}}>{zone.split(" ").slice(1).join(" ")}</span>
                              </div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,marginLeft:8}}>
                              <span style={{fontWeight:700,color:C.accent,fontSize:13}}>{s.cbm} CBM</span>
                              <span style={{fontSize:10,fontWeight:600,color:etaColor,background:etaColor+"18",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap"}}>{etaLabel}</span>
                            </div>
                          </div>
                        </div>
                        </React.Fragment>
                      );
                    });
                  })()}
                  {shipments.filter(s=>s.status!=="released").length===0&&<div style={{textAlign:"center",color:C.muted,padding:20,fontSize:12}}>No shipments at Montreal yet.</div>}
                </div>
              </Card>
              <Card>
                <ST color={C.gold}>Cost Estimate</ST>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  {[["Helpers",helpers,setHelpers],["Rate ($/day)",helperRate,setHelperRate],["Cross-dock ($)",crossDock,setCrossDock],["Other ($)",extraCosts,setExtraCosts]].map(([l,v,s])=>(
                    <div key={l}><label style={{...lbl,fontSize:10}}>{l}</label><input type="number" value={v} onChange={e=>s(e.target.value)} style={{...inp,padding:"7px 10px"}}/></div>
                  ))}
                </div>
                <CostRow label="Est. Miles" value={costs.mi.toLocaleString()+" mi"} plain/>
                <CostRow label="Diesel" value={costs.diesel} rate={cadRate}/>
                <CostRow label="Tolls" value={costs.tolls} rate={cadRate}/>
                <CostRow label="Helpers" value={costs.helperTot} rate={cadRate}/>
                <CostRow label="Cross-dock" value={costs.cross} rate={cadRate}/>
                <CostRow label="Other" value={costs.extra} rate={cadRate}/>
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"2px solid "+C.soft,marginTop:4,flexWrap:"wrap",gap:4}}>
                  <span style={{fontWeight:700}}>Total</span>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:20,color:C.accent}}>{fmt$(costs.total)}</div>
                    <div style={{fontSize:12,color:C.muted}}>{fmtCAD(costs.total,cadRate)}</div>
                  </div>
                </div>
              </Card>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <Card>
                <ST color={C.rose}>Route Stops</ST>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                  <div><label style={lbl}>City</label><input value={newStop.city} onChange={e=>setNewStop(p=>({...p,city:e.target.value}))} placeholder="Chicago" style={{...inp,padding:"8px 10px"}}/></div>
                  <div><label style={lbl}>State</label>
                    <select value={newStop.state} onChange={e=>setNewStop(p=>({...p,state:e.target.value}))} style={{...inp,padding:"8px 10px"}}>
                      <option value="">Select</option>
                      {STATES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div><label style={lbl}>Stop Type</label>
                    <select value={newStop.type} onChange={e=>setNewStop(p=>({...p,type:e.target.value}))} style={{...inp,padding:"8px 10px"}}>
                      {STOP_TYPES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div><label style={lbl}>Notes</label><input value={newStop.notes} onChange={e=>setNewStop(p=>({...p,notes:e.target.value}))} placeholder="Details…" style={{...inp,padding:"8px 10px"}}/></div>
                </div>
                <button onClick={addStop} style={{width:"100%",padding:10,background:"linear-gradient(135deg,"+C.accent+","+C.rose+")",border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,marginBottom:12,boxShadow:"0 4px 14px "+C.accent+"30"}}>
                  Add Stop
                </button>
                <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:220,overflowY:"auto"}}>
                  {routeStops.map((stop,idx)=>(
                    <div key={stop.id} style={{background:"#ffffff",borderRadius:10,padding:"9px 12px",border:"1.5px solid "+(STOP_COLORS[stop.type]||C.accent)+"44",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{background:C.accent,color:"#fff",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0}}>{idx+1}</span>
                      <span>{STOP_ICONS[stop.type]||"📍"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:700}}>{stop.city}, {stop.state}</div>
                        {stop.notes&&<div style={{fontSize:10,color:C.muted}}>"{stop.notes}"</div>}
                        {etasB[idx]&&<div style={{fontSize:10,color:C.accent}}>ETA: {fmtDT(etasB[idx].arrive)}</div>}
                      </div>
                      <div style={{display:"flex",gap:3}}>
                        <button onClick={()=>moveStop(idx,-1)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>↑</button>
                        <button onClick={()=>moveStop(idx,1)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>↓</button>
                        <button onClick={()=>removeStop(stop.id)} style={{background:"transparent",border:"none",color:C.danger,cursor:"pointer",fontSize:13}}>✕</button>
                      </div>
                    </div>
                  ))}
                  {!routeStops.length&&<div style={{textAlign:"center",color:C.muted,padding:"14px 0",fontSize:12}}>Add stops manually or use auto-fill</div>}
                </div>
              </Card>
              <Card>
                <ST color={C.mint}>Schedule & Save</ST>
                <div style={{marginBottom:12}}>
                  <label style={lbl}>Estimated Departure Date</label>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Auto-calculated from selected shipments + 2 days deconsolidation</div>
                  <input type="datetime-local" value={warehouseReady} onChange={e=>setWarehouseReady(e.target.value)} style={inp}/>
                </div>
                {depDtBuilt&&(
                  <div style={{background:C.ok+"14",border:"1px solid "+C.ok+"44",borderRadius:12,padding:12,marginBottom:12}}>
                    <div style={{fontSize:10,color:C.ok,fontWeight:700}}>Recommended Departure</div>
                    <div style={{fontSize:15,fontWeight:800}}>{fmtDT(depDtBuilt)}</div>
                    <div style={{fontSize:10,color:C.muted}}>4h buffer after last shipment ready</div>
                  </div>

                <div style={{marginBottom:12}}>
                  <label style={lbl}>Route Name</label>
                  <input value={routeName} onChange={e=>setRouteName(e.target.value)} placeholder={"Route "+new Date().toLocaleDateString()} style={inp}/>
                </div>
                {/* RETURN SECTION */}
                <div style={{background:"#f0f8f4",border:"1.5px solid #4a926844",borderRadius:12,padding:"12px 14px",marginBottom:12}}>

                  <div style={{marginBottom:10}}>
                    <label style={lbl}>Estimated Return Date</label>
                    <input type="date" value={returnDate} onChange={e=>setReturnDate(e.target.value)} style={inp}/>
                  </div>
                  <div>
                    <label style={lbl}>Return route via (states/provinces on the way back)</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
                      {["Florida","Georgia","North Carolina","Virginia","New Jersey","New York","Pennsylvania","Ohio","Ontario","Quebec"].map(st=>{
                        const sel=returnVia.includes(st);
                        return(
                          <button key={st} onClick={()=>setReturnVia(p=>sel?p.filter(x=>x!==st):[...p,st])}
                            style={{padding:"3px 10px",background:sel?C.ok:"#fff",border:"1.5px solid "+(sel?C.ok:"#ccc"),borderRadius:20,fontSize:11,fontWeight:sel?700:400,color:sel?"#fff":"#666",cursor:"pointer",transition:"all 0.15s"}}>
                            {st}

                    <div style={{fontSize:10,color:C.muted,marginTop:5}}>Select the states/provinces the driver will pass through on the return trip</div>
